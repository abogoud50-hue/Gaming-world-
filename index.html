<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLT | متجر التحميل المباشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --volt-orange: #ff5722; --dark-bg: #0f111a; --card-bg: #1a1d29; --text-white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-bg); color: var(--text-white); margin: 0; padding: 20px; text-align: center; }
        .logo { font-size: 32px; font-weight: 900; color: var(--volt-orange); margin-bottom: 20px; display: block; }
        .game-card { background-color: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: right; border: 1px solid #333; }
        .btn-dl { display: block; background: var(--volt-orange); color: white; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <span class="logo">⚡ VOLT</span>

    <div class="game-card">
        <h3>WhatsApp Messenger</h3>
        <p>النسخة الرسمية المباشرة</p>
        <a href="https://www.whatsapp.com/android/current/WhatsApp.apk" class="btn-dl">تحميل مباشر APK 📥</a>
    </div>

    <div class="game-card">
        <h3>Facebook Lite</h3>
        <a href="https://www.facebook.com/download/android/lite" class="btn-dl">تحميل مباشر APK 📥</a>
    </div>

    <div class="game-card">
        <h3>Instagram</h3>
        <a href="https://www.instagram.com/download/android" class="btn-dl">تحميل مباشر APK 📥</a>
    </div>

</body>
</html>
